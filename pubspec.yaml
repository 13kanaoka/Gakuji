name: gakuji
description: "Gakuji — a Japanese kanji handwriting and flashcard study app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.3
  google_mlkit_digital_ink_recognition: ^0.14.2
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.3
  path: ^1.9.1
  path_provider: ^2.1.6
  image_picker: ^1.2.3
  firebase_auth: ^6.5.6
  google_sign_in: ^7.2.0
  firebase_core: ^4.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/fugu.jpg"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/dictionary/dictionary.db
    - assets/images/deck_watermark_1.png
    - assets/images/deck_watermark_2.png
    - assets/images/deck_watermark_3.png