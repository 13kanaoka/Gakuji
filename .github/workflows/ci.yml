name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  commit-messages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Validates every new commit with the same script used by the local
      # commit-msg hook, so the rules live in one place (.githooks/commit-msg).
      - name: Validate commit messages
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            range="origin/$GITHUB_BASE_REF..HEAD"
          elif printf '%s' "$BEFORE" | grep -qE '^0+$'; then
            # First push of a new branch: only check the head commit
            range="-1 HEAD"
          else
            range="$BEFORE..$GITHUB_SHA"
          fi

          fail=0
          while IFS= read -r subject; do
            printf '%s\n' "$subject" > /tmp/commit-msg
            if .githooks/commit-msg /tmp/commit-msg 2>/dev/null; then
              echo "ok:  $subject"
            else
              echo "BAD: $subject"
              fail=1
            fi
          done < <(git log --format=%s $range)

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "Commit messages must follow: <type>(scope): description"
            echo "Allowed types: feat fix docs style refactor perf test build ci chore rem"
            exit 1
          fi

  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze --fatal-infos
